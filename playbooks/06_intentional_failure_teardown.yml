---
- name: Integration test - intentional failure teardown
  hosts: integration_test_vm
  become: true
  gather_facts: true
  vars_files:
    - ../vars/webhook.yml
  vars:
    integration_suite_name: "managed-slurm-integration"
    integration_playbook_name: "06_intentional_failure_teardown.yml"
    rollback_playbook_hint: "playbooks/06_intentional_failure_teardown.yml"

  pre_tasks:
    - name: Set integration run metadata
      ansible.builtin.set_fact:
        integration_run_id: >-
          {{
            lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ')
          }}-{{ inventory_hostname }}-intentional-failure-teardown
        integration_failed: false

    - name: Notify webhook that intentional failure teardown started
      ansible.builtin.include_tasks: ../tasks/webhook_event.yml
      vars:
        webhook_status: "running"
        webhook_checkpoint: "start"
        webhook_description: "Intentional failure teardown playbook started."

  tasks:
    - name: Execute intentional failure teardown rollback tasks
      block:
        - name: Remove all fail-halfway setup artifacts
          ansible.builtin.include_tasks: ../tasks/rollback_fail_halfway.yml

        - name: Notify checkpoint after fail-halfway teardown cleanup
          ansible.builtin.include_tasks: ../tasks/webhook_event.yml
          vars:
            webhook_status: "running"
            webhook_checkpoint: "cleanup_complete"
            webhook_description: "Fail-halfway teardown cleanup actions completed."

      rescue:
        - name: Mark intentional failure teardown as failed
          ansible.builtin.set_fact:
            integration_failed: true

        - name: Notify webhook that intentional failure teardown failed
          ansible.builtin.include_tasks: ../tasks/webhook_event.yml
          vars:
            webhook_status: "failed"
            webhook_checkpoint: "failed"
            webhook_error_code: 1006
            webhook_description: "Intentional failure teardown failed before finishing cleanup."

      always:
        - name: Notify webhook final status for intentional failure teardown
          ansible.builtin.include_tasks: ../tasks/webhook_event.yml
          vars:
            webhook_status: "{{ 'failed' if integration_failed else 'success' }}"
            webhook_checkpoint: "end"
            webhook_error_code: "{{ 1006 if integration_failed else 0 }}"
            webhook_description: >-
              {{
                'Intentional failure teardown encountered failures.'
                if integration_failed
                else 'Intentional failure teardown completed successfully.'
              }}
