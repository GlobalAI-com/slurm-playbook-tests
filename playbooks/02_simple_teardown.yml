---
- name: Integration test - simple teardown
  hosts: integration_test_vm
  become: true
  gather_facts: true
  vars_files:
    - ../vars/webhook.yml
  vars:
    integration_suite_name: "managed-slurm-integration"
    integration_playbook_name: "02_simple_teardown.yml"
    rollback_playbook_hint: "playbooks/02_simple_teardown.yml"

  pre_tasks:
    - name: Set integration run metadata
      ansible.builtin.set_fact:
        integration_run_id: >-
          {{
            lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ')
          }}-{{ inventory_hostname }}-simple-teardown
        integration_failed: false

    - name: Notify webhook that simple teardown started
      ansible.builtin.include_tasks: ../tasks/webhook_event.yml
      vars:
        webhook_status: "running"
        webhook_checkpoint: "start"
        webhook_description: "Simple teardown playbook started."

  tasks:
    - name: Execute simple teardown rollback tasks
      block:
        - name: Remove all simple setup artifacts
          ansible.builtin.include_tasks: ../tasks/rollback_simple.yml

        - name: Notify checkpoint after simple teardown cleanup
          ansible.builtin.include_tasks: ../tasks/webhook_event.yml
          vars:
            webhook_status: "running"
            webhook_checkpoint: "cleanup_complete"
            webhook_description: "Simple teardown cleanup actions completed."

      rescue:
        - name: Mark simple teardown as failed
          ansible.builtin.set_fact:
            integration_failed: true

        - name: Notify webhook that simple teardown failed
          ansible.builtin.include_tasks: ../tasks/webhook_event.yml
          vars:
            webhook_status: "failed"
            webhook_checkpoint: "failed"
            webhook_error_code: 1002
            webhook_description: "Simple teardown failed before finishing cleanup."

      always:
        - name: Notify webhook final status for simple teardown
          ansible.builtin.include_tasks: ../tasks/webhook_event.yml
          vars:
            webhook_status: "{{ 'failed' if integration_failed else 'success' }}"
            webhook_checkpoint: "end"
            webhook_error_code: "{{ 1002 if integration_failed else 0 }}"
            webhook_description: >-
              {{
                'Simple teardown encountered failures.'
                if integration_failed
                else 'Simple teardown completed successfully.'
              }}
